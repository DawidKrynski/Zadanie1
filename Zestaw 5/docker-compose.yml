services:
  server:
    build:
      context: ./server
    ports:
      - "8080:8080"
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped